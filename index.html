<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>24시간 주간 일정표</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #111111;
      color: #f2f2f2;
    }

    header {
      padding: 20px 24px;
      background: #111111;
      border-bottom: 1px solid #222;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .auth-panel {
      margin: 20px;
      padding: 16px;
      background: #1b1b1b;
      border: 1px solid #2f2f2f;
      border-radius: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .google-btn {
      width: auto;
      margin-top: 0;
      padding: 11px 16px;
      background: #222;
      color: #fff;
    }

    .logout-btn {
      width: auto;
      margin-top: 0;
      padding: 11px 16px;
      background: #eee;
      color: #222;
    }

    .user-info {
      font-size: 14px;
      color: #aaa;
    }

    .app {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    .form-panel {
      width: 280px;
      padding: 18px;
      background: #1b1b1b;
      border: 1px solid #2f2f2f;
      border-radius: 12px;
      height: fit-content;
      position: sticky;
      top: 20px;
    }

    .form-panel h2 {
      margin: 0 0 16px;
      font-size: 18px;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      font-family: inherit;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      padding: 10px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #111;
      color: #f2f2f2;
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    button {
      margin-top: 14px;
      padding: 11px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .add-btn {
      background: #222;
      color: white;
    }

    .reset-btn {
      background: #eee;
      color: #222;
    }

    .delete-btn {
      background: #ff4d4d;
      color: white;
    }

    .color-palette,
    .recent-colors {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .color-chip,
    .recent-color-chip {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.25);
    }

    .schedule-wrap {
      flex: 1;
      overflow: visible;
      background: #111111;
      border: 1px solid #333;
      border-radius: 12px;
    }

    .schedule {
      display: grid;
      width: 100%;
      grid-template-columns: 22px repeat(7, 1fr);
      grid-template-rows: 22px repeat(16, calc((100% - 22px) / 7));
      position: relative;
    }

    .corner {
      grid-column: 1;
      grid-row: 1;
      background: #111111;
      border-right: 1px solid #333;
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      left: 0;
      z-index: 20;
    }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111111;
      border-right: 1px solid #333;
      border-bottom: 1px solid #333;
      font-weight: bold;
      color: #cfcfcf;
      position: sticky;
      top: 0;
      z-index: 10;

   .time-label {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 6px;
      background: #111111;
      border-right: 1px solid #333;
      border-bottom: 1px solid #292929;
      font-size: 12px;
      color: #aaa;
      position: sticky;
      left: 0;
      z-index: 8;
    }

    .cell {
      border-right: 1px solid #2c2c2c;
      border-bottom: 1px solid #2c2c2c;
      background: #111111;
    }

    .day-column {
      position: relative;
      grid-row: 2 / span 16;
      overflow: hidden;
    }

    .event {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 5;
      padding: 5px;
      border-radius: 2px;
      color: white;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .event-title {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-time,
    .event-memo {
      font-size: 11px;
      line-height: 1.3;
      opacity: 0.95;
    }

    .event-memo {
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal {
      width: 360px;
      max-width: 100%;
      background: #1b1b1b;
      color: #f2f2f2;
      border-radius: 14px;
      padding: 20px;
      border: 1px solid #333;
    }

    .modal h3 {
      margin: 0 0 8px;
    }

    .modal p {
      margin: 7px 0;
      font-size: 14px;
      line-height: 1.5;
    }

    .modal input,
    .modal select,
    .modal textarea {
      margin-top: 6px;
      margin-bottom: 8px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .modal-actions button {
      margin-top: 0;
    }

    .close-btn {
      background: #eee;
    }

    @media (max-width: 800px) {
      .app {
        flex-direction: column;
        padding: 12px;
        gap: 12px;
      }

      .form-panel {
        width: 100%;
        position: static;
        padding: 14px;
      }

      .schedule {
        width: 100%;
        min-width: 0;
        grid-template-columns: 22px repeat(7, 1fr);
        grid-template-rows: 22px repeat(16, calc((100% - 22px) / 7));
      }

      .event {
        padding: 2px;
      }

      .event-title {
        font-size: 8px;
      }

      .event-time,
      .event-memo {
        font-size: 7px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>24시간 주간 일정표</h1>
  </header>

  <section class="auth-panel" id="authPanel">
    <button class="google-btn" id="googleLoginBtn" type="button">Google 계정으로 로그인</button>
    <div class="user-info" id="userInfo"></div>
    <button class="logout-btn" id="logoutBtn" type="button" style="display:none;">로그아웃</button>
  </section>

  <main class="app" id="mainApp" style="display:none;">
    <aside class="form-panel">
      <h2>일정 추가</h2>

      <form id="eventForm">
        <label for="title">일정 이름</label>
        <input id="title" type="text" required />

        <label for="day">요일</label>
        <select id="day">
          <option value="0">월요일</option>
          <option value="1">화요일</option>
          <option value="2">수요일</option>
          <option value="3">목요일</option>
          <option value="4">금요일</option>
          <option value="5">토요일</option>
          <option value="6">일요일</option>
        </select>

        <label for="startTime">시작 시간</label>
        <input id="startTime" type="time" required />

        <label for="endTime">종료 시간</label>
        <input id="endTime" type="time" required />

        <label for="color">색상</label>
        <input id="color" type="color" value="#3b82f6" />

        <div id="colorPalette" class="color-palette"></div>

        <label for="memo">메모</label>
        <textarea id="memo"></textarea>

        <button class="add-btn" type="submit">일정 추가</button>
        <button class="reset-btn" type="button" id="clearAllBtn">전체 삭제</button>
      </form>
    </aside>

    <section class="schedule-wrap">
      <div class="schedule" id="schedule"></div>
    </section>
  </main>

    <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <p id="modalDay"></p>
      <p id="modalTime"></p>
      <p id="modalMemo"></p>

      <div class="modal-actions">
        <button class="delete-btn" id="deleteEventBtn">삭제</button>
        <button class="close-btn" id="closeModalBtn">닫기</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    import {
      getFirestore,
      doc,
      setDoc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCC8AhKrsSQB7nA9NexD0aUYvrSusODUPA",
      authDomain: "timetable-29968.firebaseapp.com",
      projectId: "timetable-29968",
      storageBucket: "timetable-29968.firebasestorage.app",
      messagingSenderId: "57441222194",
      appId: "1:57441222194:web:e50fb8e803b104c10c462b",
      measurementId: "G-9G0MSYEYHP"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let events = [];
    let selectedEventId = null;

    const days = ["월", "화", "수", "목", "금", "토", "일"];

    const schedule = document.getElementById("schedule");
    const googleLoginBtn = document.getElementById("googleLoginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const userInfo = document.getElementById("userInfo");
    const mainApp = document.getElementById("mainApp");

    const eventForm = document.getElementById("eventForm");
    const clearAllBtn = document.getElementById("clearAllBtn");

    const colorInput = document.getElementById("color");
    const colorPalette = document.getElementById("colorPalette");

    const modalBg = document.getElementById("modalBg");
    const modalTitle = document.getElementById("modalTitle");
    const modalDay = document.getElementById("modalDay");
    const modalTime = document.getElementById("modalTime");
    const modalMemo = document.getElementById("modalMemo");

    const deleteEventBtn = document.getElementById("deleteEventBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");

    const recommendedColors = [
      "#3b82f6","#ef4444","#22c55e","#eab308",
      "#a855f7","#14b8a6","#f97316","#ec4899"
    ];

    recommendedColors.forEach(color => {
      const chip = document.createElement("div");
      chip.className = "color-chip";
      chip.style.background = color;
      chip.onclick = () => colorInput.value = color;
      colorPalette.appendChild(chip);
    });

    function timeToMinutes(time) {
      const [h, m] = time.split(":").map(Number);
      return h * 60 + m;
    }

    async function saveEvents() {
      if (!currentUser) return;
      await setDoc(doc(db, "users", currentUser.uid), { events });
    }

    async function loadEvents() {
      if (!currentUser) return;
      const snap = await getDoc(doc(db, "users", currentUser.uid));
      events = snap.exists() ? snap.data().events || [] : [];
    }

    function buildScheduleGrid() {
      schedule.innerHTML = "";

      const corner = document.createElement("div");
      corner.className = "corner";
      schedule.appendChild(corner);

      days.forEach((d, i) => {
        const el = document.createElement("div");
        el.className = "day-header";
        el.textContent = d;
        el.style.gridColumn = i + 2;
        schedule.appendChild(el);
      });

      for (let h = 6; h < 22; h++) {
        const t = document.createElement("div");
        t.className = "time-label";
        t.textContent = `${h}:00`;
        t.style.gridRow = (h - 6) + 2;
        schedule.appendChild(t);

        for (let d = 0; d < 7; d++) {
          const c = document.createElement("div");
          c.className = "cell";
          c.style.gridColumn = d + 2;
          c.style.gridRow = (h - 6) + 2;
          schedule.appendChild(c);
        }
      }

      for (let d = 0; d < 7; d++) {
        const col = document.createElement("div");
        col.className = "day-column";
        col.dataset.day = d;
        col.style.gridColumn = d + 2;
        schedule.appendChild(col);
      }
    }

        function getTextColor(bgColor) {
      const r = parseInt(bgColor.substr(1, 2), 16);
      const g = parseInt(bgColor.substr(3, 2), 16);
      const b = parseInt(bgColor.substr(5, 2), 16);
      const brightness = (r * 299 + g * 587 + b * 114) / 1000;
      return brightness > 150 ? "#111" : "#fff";
    }

    function renderEvents() {
      document.querySelectorAll(".day-column").forEach(col => {
        col.innerHTML = "";
      });

      const cell = document.querySelector(".cell");
      if (!cell) return;

      const hourHeight = cell.getBoundingClientRect().height;
      const minuteHeight = hourHeight / 60;

      events.forEach(event => {
        const column = document.querySelector(`.day-column[data-day="${event.day}"]`);
        if (!column) return;

        const startMinutes = timeToMinutes(event.startTime) - (6 * 60);
        const endMinutes = timeToMinutes(event.endTime) - (6 * 60);
        const duration = endMinutes - startMinutes;

        if (endMinutes <= 0 || startMinutes >= 16 * 60) return;

        const visibleStart = Math.max(startMinutes, 0);
        const visibleDuration = Math.min(endMinutes, 16 * 60) - visibleStart;

        const eventEl = document.createElement("div");
        eventEl.className = "event";
        eventEl.style.top = `${visibleStart * minuteHeight}px`;
        eventEl.style.height = `${visibleDuration * minuteHeight}px`;
        eventEl.style.background = event.color;
        eventEl.style.color = getTextColor(event.color);

        eventEl.innerHTML = `
          <div class="event-title">${event.title}</div>
          <div class="event-time">${event.startTime} ~ ${event.endTime}</div>
          ${event.memo ? `<div class="event-memo">${event.memo}</div>` : ""}
        `;

        eventEl.addEventListener("click", () => openModal(event.id));
        column.appendChild(eventEl);
      });
    }

    function hasConflict(newEvent, ignoreId = null) {
      return events.some(event => {
        if (ignoreId && event.id === ignoreId) return false;
        if (Number(event.day) !== Number(newEvent.day)) return false;

        const existingStart = timeToMinutes(event.startTime);
        const existingEnd = timeToMinutes(event.endTime);
        const newStart = timeToMinutes(newEvent.startTime);
        const newEnd = timeToMinutes(newEvent.endTime);

        return newStart < existingEnd && newEnd > existingStart;
      });
    }

    async function addEvent(event) {
      event.preventDefault();

      const title = document.getElementById("title").value.trim();
      const day = Number(document.getElementById("day").value);
      const startTime = document.getElementById("startTime").value;
      const endTime = document.getElementById("endTime").value;
      const color = document.getElementById("color").value;
      const memo = document.getElementById("memo").value.trim();

      if (!title) {
        alert("일정 이름을 입력해주세요.");
        return;
      }

      if (timeToMinutes(startTime) >= timeToMinutes(endTime)) {
        alert("종료 시간은 시작 시간보다 늦어야 합니다.");
        return;
      }

      const newEvent = {
        id: Date.now().toString(),
        title,
        day,
        startTime,
        endTime,
        color,
        memo
      };

      if (hasConflict(newEvent)) {
        alert("이미 같은 시간대에 일정이 있습니다.");
        return;
      }

      events.push(newEvent);
      await saveEvents();
      renderEvents();

      eventForm.reset();
      colorInput.value = "#3b82f6";
    }

    function openModal(id) {
      const event = events.find(e => e.id === id);
      if (!event) return;

      selectedEventId = id;

      modalTitle.textContent = event.title;
      modalDay.textContent = `요일: ${days[event.day]}요일`;
      modalTime.textContent = `시간: ${event.startTime} ~ ${event.endTime}`;
      modalMemo.textContent = event.memo ? `메모: ${event.memo}` : "메모 없음";

      modalBg.style.display = "flex";
    }

    function closeModal() {
      modalBg.style.display = "none";
      selectedEventId = null;
    }

    async function deleteSelectedEvent() {
      if (!selectedEventId) return;

      events = events.filter(event => event.id !== selectedEventId);
      await saveEvents();
      renderEvents();
      closeModal();
    }

    eventForm.addEventListener("submit", addEvent);

    deleteEventBtn.addEventListener("click", deleteSelectedEvent);
    closeModalBtn.addEventListener("click", closeModal);

    modalBg.addEventListener("click", event => {
      if (event.target === modalBg) closeModal();
    });

    clearAllBtn.addEventListener("click", async () => {
      if (!confirm("모든 일정을 삭제할까요?")) return;
      events = [];
      await saveEvents();
      renderEvents();
    });

    googleLoginBtn.addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        alert("로그인에 실패했습니다. Firebase 설정과 승인된 도메인을 확인해주세요.");
        console.error(error);
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
    });

    onAuthStateChanged(auth, async user => {
      currentUser = user;

      if (user) {
        googleLoginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
        userInfo.textContent = `${user.displayName || "사용자"}님 로그인 중`;
        mainApp.style.display = "flex";

        buildScheduleGrid();
        await loadEvents();
        renderEvents();
      } else {
        googleLoginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
        userInfo.textContent = "로그인하면 시간표가 계정에 저장됩니다.";
        mainApp.style.display = "none";
        events = [];
      }
    });

    window.addEventListener("resize", renderEvents);
  </script>
</body>
</html>
